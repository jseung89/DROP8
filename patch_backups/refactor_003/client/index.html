<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DROP 8</title></head><body>
<div id="app">
  <section id="home" class="screen card"><div class="brand"><small>2D REALTIME BATTLE ROYALE</small><h1>DROP <b>8</b></h1><p>친구들과 방 코드로 접속해 비행기에서 낙하하고, 맨손으로 파밍을 시작하세요.</p></div>
    <label>닉네임<input id="nickname" maxlength="16" placeholder="비우면 자동 생성"></label><label>방 코드<input id="roomCode" maxlength="6" placeholder="예: A7BC9K"></label><label>방 비밀번호<input id="password" maxlength="32" placeholder="선택"></label>
    <div class="row"><button id="createBtn" class="primary">방 만들기</button><button id="joinBtn">방 참가</button></div><div id="homeError" class="error"></div>
    <details><summary>조작법</summary><p>WASD 이동 · 마우스 조준 · 좌클릭 공격 · E 획득 · R 재장전 · 1/2/3 무기 · 4 붕대 · M 지도 · Enter 채팅 · Space 낙하</p></details>
  </section>
  <section id="lobby" class="screen hidden"><div class="lobby-layout"><div class="card"><div class="title-row"><h2>대기실 <span id="codeText"></span></h2><button id="copyBtn">초대 링크 복사</button></div><div id="slots" class="slots"></div><div id="hostSettings" class="settings"><label><input id="fillAi" type="checkbox" checked> 빈자리 AI 충원</label><label>AI <select id="difficulty"><option>easy</option><option selected>normal</option><option>hard</option></select></label><label>자기장 <select id="zoneSpeed"><option>slow</option><option selected>normal</option><option>fast</option></select></label></div><div class="row"><button id="readyBtn" class="primary">준비</button><button id="startBtn">게임 시작</button></div></div>
    <div class="card chat-card"><h3>로비 채팅</h3><div id="lobbyMessages" class="messages"></div><form id="lobbyChat"><input id="lobbyChatInput" maxlength="80" placeholder="메시지"><button>전송</button></form></div></div></section>
  <section id="game" class="hidden"><div id="gameCanvas"></div><div id="topHud" class="hud top"><span id="phaseText">PLANE</span><span>생존 <b id="aliveText">8</b></span><span>킬 <b id="killsText">0</b></span><span>자기장 <b id="zoneText">30</b></span></div><div id="bottomHud" class="hud bottom"><div>HP <b id="hpText">100</b> · 조끼 <b id="armorText">0</b></div><div id="weaponText">주먹</div><div id="ammoText"></div><div id="interactText"></div></div><div id="killfeed"></div><div id="gameMessages" class="game-messages"></div><form id="gameChat" class="game-chat hidden"><input id="gameChatInput" maxlength="80" placeholder="근거리 채팅"><button>전송</button></form><div id="quickChat" class="quick-chat hidden"><button data-msg="무기 없다!">무기 없다!</button><button data-msg="싸우지 말자!">싸우지 말자!</button><button data-msg="여기 누구 있다!">여기 누구 있다!</button><button data-msg="도망가자!">도망가자!</button><button data-msg="나와라!">나와라!</button><button data-msg="ㅋㅋㅋㅋ">ㅋㅋㅋㅋ</button></div><div id="result" class="result hidden"><h2 id="resultTitle"></h2><p id="resultStats"></p><button id="rematchBtn" class="primary">로비로 돌아가기</button></div></section>
</div><script type="module" src="/src/main.ts"></script></body></html>
